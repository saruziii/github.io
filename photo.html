<!DOCTYPE html>
<img class="drag"
     src="新しい写真.JPG"
     width="280"
     style="top:1500px; left:2200px;">
<html lang="ja">
<head>
<meta charset="utf-8">
<title>Photo</title>

<style>
body{
  margin:0;
  background:white;
  overflow:auto;
}

#canvas{
  width:4000px;
  height:3000px;
  position:relative;
}

.drag{
  position:absolute;
  cursor:grab;
  user-select:none;
  box-shadow:0 4px 12px rgba(0,0,0,.08);
}
</style>

</head>

<body>

<div id="canvas">

<img class="drag"
    src="DSC_0081.JPG"
    width="320"
    style="top:300px; left:200px;">

<img class="drag"
    src="DSC_0084.JPG"
    width="260"
    style="top:900px; left:1100px;">

</div>

<script>

const images = document.querySelectorAll(".drag");
let highestZ = 1;

images.forEach(img => {

  let isDragging = false;
  let offsetX = 0;
  let offsetY = 0;

  img.addEventListener("mousedown", (e) => {

    isDragging = true;

    offsetX = e.clientX - img.offsetLeft;
    offsetY = e.clientY - img.offsetTop;

    highestZ++;
    img.style.zIndex = highestZ;

  });

  document.addEventListener("mousemove", (e) => {

    if(!isDragging) return;

    img.style.left = (e.clientX - offsetX) + "px";
    img.style.top  = (e.clientY - offsetY) + "px";

  });

  document.addEventListener("mouseup", () => {

    isDragging = false;

  });

});

</script>

</body>
</html>
