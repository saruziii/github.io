<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8">
<title>Photo</title>

<style>
body{
  margin:0;
  background:white;
  width:100vw;
  height:100vh;
  overflow:hidden;
  position:relative;
}

.drag{
  position:absolute;
  cursor:grab;
  user-select:none;
}
</style>

</head>

<body>

<img class="drag" src="DSC_0081.JPG" width="300"
  style="top:100px; left:100px;">

<img class="drag" src="DSC_0084.JPG" width="300"
  style="top:300px; left:500px;">

<script>

const images = document.querySelectorAll(".drag");

images.forEach(img => {

  let isDragging = false;
  let offsetX = 0;
  let offsetY = 0;

  img.addEventListener("mousedown", (e) => {

    isDragging = true;

    offsetX = e.clientX - img.offsetLeft;
    offsetY = e.clientY - img.offsetTop;

    img.style.zIndex = Date.now();

  });

  document.addEventListener("mousemove", (e) => {

    if (!isDragging) return;

    img.style.left = (e.clientX - offsetX) + "px";
    img.style.top = (e.clientY - offsetY) + "px";

  });

  document.addEventListener("mouseup", () => {

    isDragging = false;

  });

});

</script>

</body>
</html>
