<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo</title>

<style>

body{
  margin:0;
  background:white;
  overflow:auto;
}

#canvas{
  width:4000px;
  height:3000px;
  position:relative;
}

.drag{
  position:absolute;
  cursor:grab;
  user-select:none;
}
.zoomed{
  position: fixed !important;
  top: 50% !important;
  left: 50% !important;
  transform: translate(-50%, -50%);
  max-width: 90vw;
  max-height: 90vh;
  width: auto !important;
  z-index: 9999 !important;
}
</style>

</head>

<body>

<div id="canvas">

<img class="drag"
    src="DSC_0081.JPG"
    width="320"
    style="top:100px; left:100px;">

<img class="drag"
    src="DSC_0084.JPG"
    width="320"
    style="top:250px; left:500px;">
  
<img class="drag"
     src="DSC_0085.JPG"
     width="320"
     style="top:500px; left:900px;">
  
<img class="drag"
     src="DSC_0018.JPG"
     width="320"
     style="top:500px; left:700px;">

<img class="drag"
     src="DSC_0398.JPG"
     width="320"
     style="top:600px; left:500px;"> 

<img class="drag"
     src="DSC_0582.JPG"
     width="320"
     style="top:300px; left:600px;"> 
  
</div>

<script>

const images = document.querySelectorAll(".drag");
let highestZ = 1;

images.forEach(img => {

  let isDragging = false;
  let offsetX = 0;
  let offsetY = 0;

  img.addEventListener("mousedown", (e) => {

    isDragging = true;

    offsetX = e.clientX - img.offsetLeft;
    offsetY = e.clientY - img.offsetTop;

    highestZ++;
    img.style.zIndex = highestZ;

  });

  document.addEventListener("mousemove", (e) => {

    if(!isDragging) return;

    img.style.left = (e.clientX - offsetX) + "px";
    img.style.top = (e.clientY - offsetY) + "px";

  });

document.addEventListener("mouseup", () => {
isDragging = false;

});

img.addEventListener("dblclick", () => {
img.classList.toggle("zoomed");

});

});

</script>

</body>
</html>
