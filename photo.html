<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<title>Photo</title>

<style>
body {
  margin: 0;
  background: white;
  width: 100%;
  height: 100vh;
  overflow: hidden;
  position: relative;
}

.draggable {
  position: absolute;
  width: 300px;
  cursor: grab;
}

#img1 {
  top: 120px;
  left: 100px;
}

#img2 {
  top: 300px;
  left: 500px;
}
</style>
</head>

<body>

<img src="photo1.jpg" id="img1" class="draggable">
<img src="photo2.jpg" id="img2" class="draggable">

<script>
const draggables = document.querySelectorAll(".draggable");

draggables.forEach(img => {
  let offsetX, offsetY, isDragging = false;

  img.addEventListener("mousedown", (e) => {
    isDragging = true;
    offsetX = e.clientX - img.offsetLeft;
    offsetY = e.clientY - img.offsetTop;
  });

  document.addEventListener("mousemove", (e) => {
    if (isDragging) {
      img.style.left = (e.clientX - offsetX) + "px";
      img.style.top = (e.clientY - offsetY) + "px";
    }
  });

  document.addEventListener("mouseup", () => {
    isDragging = false;
  });
});
</script>

</body>
</html>
