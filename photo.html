<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo</title>

<style>

body{
  margin:0;
  background:white;
  overflow:auto;
}

#canvas{
  width:4000px;
  height:3000px;
  position:relative;
}

.drag{
position:absolute;
cursor:grab;
user-select:none;

touch-action:none;
-webkit-user-drag:none;
-webkit-touch-callout:none;
}

.zoomed{
  position: fixed !important;
  top: 50% !important;
  left: 50% !important;
  transform: translate(-50%, -50%);
  max-width: 90vw;
  max-height: 90vh;
  width: auto !important;
  z-index: 9999 !important;
}
</style>

</head>

<body>

<div id="canvas">

<img class="drag"
    draggable="false"
    src="DSC_0081.JPG"
    width="320"
    style="top:100px; left:100px;">

<img class="drag"
    draggable="false"
    src="DSC_0084.JPG"
    width="320"
    style="top:250px; left:500px;">
  
<img class="drag"
     draggable="false"
     src="DSC_0085.JPG"
     width="320"
     style="top:500px; left:900px;">
  
<img class="drag"
     draggable="false"
     src="DSC_0018.JPG"
     width="320"
     style="top:500px; left:700px;">

<img class="drag"
     draggable="false"
     src="DSC_0398.JPG"
     width="320"
     style="top:600px; left:500px;"> 

<img class="drag"
     draggable="false"
     src="DSC_0582.JPG"
     width="320"
     style="top:300px; left:600px;"> 
  
</div>

<script>

const images = document.querySelectorAll(".drag");
let highestZ = 1;

images.forEach(img => {

let isDragging = false;
let offsetX = 0;
let offsetY = 0;

function startDrag(x, y){
isDragging = true;

offsetX = x - img.offsetLeft;
offsetY = y - img.offsetTop;

highestZ++;
img.style.zIndex = highestZ;
}

function moveDrag(x, y){

if(!isDragging) return;

img.style.left = (x - offsetX) + "px";
img.style.top = (y - offsetY) + "px";
}


function stopDrag(){
isDragging = false;
}

img.addEventListener("mousedown", (e) => {
startDrag(e.clientX, e.clientY);
});

document.addEventListener("mousemove", (e) => {
moveDrag(e.clientX, e.clientY);
});

document.addEventListener("mouseup", stopDrag);

img.addEventListener("touchstart", (e) => {

e.preventDefault();

const touch = e.touches[0];

startDrag(touch.clientX, touch.clientY);

}, { passive:false });

document.addEventListener("touchmove", (e) => {
e.preventDefault();
const touch = e.touches[0];
moveDrag(touch.clientX, touch.clientY);
}, { passive:false });

document.addEventListener("touchend", stopDrag);

});

</script>

</body>
</html>
