<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo</title>

<style>

.drag{
  position:absolute;
  cursor:grab;
  user-select:none;

  touch-action:none;
  -webkit-user-drag:none;
  -webkit-touch-callout:none;
}

.zoomed{
  position:fixed !important;
  top:50% !important;
  left:50% !important;
  transform:translate(-50%, -50%);
  max-width:90vw;
  max-height:90vh;
  width:auto !important;
  z-index:9999 !important;
}

}

#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:rgba(0,0,0,0.75);
  display:none;
  z-index:9998;
}

#overlay.active{
  display:block;
}

</style>

</head>

<body>

<div id="overlay"></div>

<div id="canvas">

<img class="drag" src="DSC_0081.JPG" width="320" style="top:100px; left:100px;">

</div>
