<!DOCTYPE html>

<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Photo</title>

<style>

body{
  margin:0;
  background:white;
  overflow:auto;
}

#canvas{
  width:4000px;
  height:3000px;
  position:relative;
}

.drag{
  position:absolute;
  cursor:grab;
  user-select:none;

  touch-action:none;
  -webkit-user-drag:none;
  -webkit-touch-callout:none;
}

.zoomed{
position:fixed !important;
top:50% !important;
left:50% !important;

transform:translate(-50%, -50%);

max-width:80vw !important;
max-height:80vh !important;

width:auto !important;
height:auto !important;

z-index:9999 !important;
}


#overlay{
  position:fixed;
  top:0;
  left:0;
  width:100vw;
  height:100vh;
  background:rgba(0,0,0,0.75);
  display:none;
  z-index:9998;
}

#overlay.active{
  display:block;
}

</style>

</head>

<body>

<div id="overlay"></div>

<div id="canvas">


<img class="drag" src="DSC_0398.JPG" width="320" style="top:600px; left:500px;">
<img class="drag" src="DSC_0582.JPG" width="320" style="top:300px; left:600px;">
<img class="drag" src="DSC_0471.JPG" width="320" style="top:800px; left:120px;">
<img class="drag" src="DSC_0228.JPG" width="220" style="top:400px; left:200px;">
<img class="drag" src="DSC_0553.JPG" width="220" style="top:500px; left:400px;">

</div>

<script>

const images = document.querySelectorAll(".drag");
const overlay = document.getElementById("overlay");

const savedPositions = JSON.parse(
  localStorage.getItem("alreadythere_positions")
);

if(savedPositions){

  images.forEach((img,index) => {

    if(savedPositions[index]){

      img.style.left = savedPositions[index].left;
      img.style.top = savedPositions[index].top;

    }

  });

}

let highestZ = 1;

images.forEach(img => {

  let isDragging = false;
  let offsetX = 0;
  let offsetY = 0;

  function startDrag(x,y){

    isDragging = true;

    offsetX = x - img.offsetLeft;
    offsetY = y - img.offsetTop;

    highestZ++;
    img.style.zIndex = highestZ;

  }

  function moveDrag(x,y){

    if(!isDragging) return;

    img.style.left = (x - offsetX) + "px";
    img.style.top = (y - offsetY) + "px";

  }

  function stopDrag(){

    if(!isDragging) return;

    isDragging = false;

    const positions = [];

    document.querySelectorAll(".drag").forEach(img => {

      positions.push({
        left: img.style.left,
        top: img.style.top
      });

    });

    localStorage.setItem(
      "alreadythere_positions",
      JSON.stringify(positions)
    );

  }

  img.addEventListener("pointerdown", (e) => {

    e.preventDefault();

    startDrag(
      e.clientX,
      e.clientY
    );

  });

  document.addEventListener("pointermove", (e) => {

    moveDrag(
      e.clientX,
      e.clientY
    );

  });

  document.addEventListener("pointerup", () => {

    stopDrag();

  });

  img.addEventListener("dblclick", () => {

    img.classList.toggle("zoomed");

    if(img.classList.contains("zoomed")){
      overlay.classList.add("active");
    } else {
      overlay.classList.remove("active");
    }

  });

});

overlay.addEventListener("click", () => {

  overlay.classList.remove("active");

  document.querySelectorAll(".drag").forEach(img => {
    img.classList.remove("zoomed");
  });

});

</script>

</body>
</html>
